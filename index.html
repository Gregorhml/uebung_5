<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pageSwitch">
        <a href="index.html" id="switchIndex" class="switchLink">Sign in</a>
        <a href="database.html" id="switchDatabase" class="switchLink">Database</a>
    </div>

    <div id="inputFields">
    <form method="get" enctype="multipart/form-data" id="nameForm">
        <div id="firstnameDiv">
            <label for="firstname" id="firstname">Vorname</label><br/>
            <input type="text" id="firstnameInput" name="firstname" required/>
        </div>
        <div id="lastnameDiv">
            <label for="lastname" id="lastname">Nachname</label><br/>
            <input type="text" id="lastnameInput" name="lastname" required/>
        </div>
        <div id="emailDiv">
            <label for="email" id="email">E-Mail</label><br/>
            <input type="email" id="emailInput" name="email" required>
        </div>
        <div id="gradeDiv">
            <label for ="grade" id="grade">Klasse</label><br/>
            <input type="text" id="gradeInput" name="grade" required>
        </div>
                <div id="gradeAverage">
                <label for="gradeAverage" id="gradeAverageLabel">Notendurchschnitt</label><br/>
                <input type="text" id="gradeAverageInput" name="gradeAverage" required>
        </div>

        <div>
            <input type="submit" id="submitBtn"/><br/>
            <input type="reset" id="resetBtn"/>
        </div>
    </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
